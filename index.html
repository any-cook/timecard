<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>⏰ タイムカード | 打刻</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="clock-header">
    <h1>⏰ タイムカード打刻</h1>
    <a href="admin.html" class="admin-link">⚙️ 管理画面</a>
  </header>

  <main class="clock-main">

    <!-- デモモード通知 -->
    <div class="demo-banner" id="demoBanner" style="display:none; width:100%;">
      🔧 デモモード動作中（データはブラウザに保存されます） ―
      Supabaseを設定すると本番稼動できます
    </div>

    <!-- デジタル時計 -->
    <div class="digital-clock">
      <div id="clockDisplay">00:00:00</div>
      <div id="dateDisplay"></div>
    </div>

    <!-- スタッフ選択 -->
    <div class="card" id="staffSelectSection">
      <h2>👤 スタッフを選択</h2>
      <div id="staffButtons">
        <p style="color:var(--text-muted); font-size:0.9rem; grid-column:1/-1;">
          読み込み中...
        </p>
      </div>
    </div>

    <!-- 打刻アクション -->
    <div id="clockActionSection">

      <div class="card" style="text-align:center;">
        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:6px;">選択中のスタッフ</p>
        <div class="selected-staff-name" id="selectedStaffName"></div>
      </div>

      <div class="card">
        <h2>現在の状況</h2>
        <div class="status-area" id="clockStatus">
          <span class="status-badge status-out">未出勤</span>
        </div>
      </div>

      <div class="card">
        <h2>打刻</h2>
        <div class="clock-buttons">
          <button class="clock-btn btn-in" id="btnClockIn" onclick="clockIn()">
            <span class="btn-icon">🟢</span>
            出 勤
          </button>
          <button class="clock-btn btn-out" id="btnClockOut" onclick="clockOut()" disabled>
            <span class="btn-icon">🔴</span>
            退 勤
          </button>
          <button class="clock-btn btn-break" id="btnBreak" disabled style="grid-column: 1 / -1; background: linear-gradient(135deg, #78350f, #d97706); color:#fff;">
            <span class="btn-icon">☕</span>
            休憩（準備中）
          </button>
        </div>
      </div>

      <button class="btn-back" onclick="backToStaffSelect()">
        ← スタッフ選択に戻る
      </button>

    </div>

  </main>

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/holidays.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/clock.js"></script>
  <script>
    // デモモード表示
    if (DEMO_MODE) {
      document.getElementById('demoBanner').style.display = 'block';
      initDemoData();
    }

    // 初期化
    initClock().catch(err => {
      console.error(err);
      document.getElementById('staffButtons').innerHTML =
        '<p style="color:#f85149; grid-column:1/-1;">読み込みエラーが発生しました</p>';
    });
  </script>
</body>
</html>
